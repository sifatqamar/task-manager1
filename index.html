<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #efede8;
  --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --rad: 8px; --rad-lg: 12px;
  --accent: #7F77DD; --accent-light: #EEEDFE;
  --success: #639922; --success-light: #EAF3DE;
  --warn: #BA7517; --warn-light: #FAEEDA;
  --danger: #E24B4A; --danger-light: #FCEBEB;
  --font: 'Syne', sans-serif; --mono: 'JetBrains Mono', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #242422; --bg3: #2c2c2a;
    --text: #f0f0ec; --text2: #a0a09a; --text3: #606058;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --accent-light: #2a2860;
  }
}
html, body { height: 100%; font-family: var(--font); color: var(--text); background: var(--bg3); }
body { display: flex; align-items: center; justify-content: center; padding: 20px; }
.app { display: flex; width: 100%; max-width: 1100px; height: 680px; border: 0.5px solid var(--border); border-radius: var(--rad-lg); overflow: hidden; background: var(--bg); box-shadow: 0 4px 32px rgba(0,0,0,0.08); }

/* SIDEBAR */
.sidebar { width: 230px; flex-shrink: 0; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--bg2); }
.sidebar-header { padding: 22px 18px 16px; border-bottom: 0.5px solid var(--border); }
.app-name { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.app-name span { color: var(--accent); }
.app-sub { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 2px; }
.nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 8px 5px; font-family: var(--mono); }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--rad); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; margin-bottom: 2px; border: 0.5px solid transparent; user-select: none; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: #3C3489; border-color: #AFA9EC; }
.nav-item .ni-icon { width: 18px; text-align: center; font-size: 14px; }
.nav-item .badge { margin-left: auto; font-size: 10px; font-family: var(--mono); background: var(--bg3); color: var(--text3); padding: 2px 7px; border-radius: 10px; min-width: 22px; text-align: center; }
.nav-item.active .badge { background: #AFA9EC; color: #26215C; }
.proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-footer { padding: 14px; border-top: 0.5px solid var(--border); }
.add-task-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--rad); font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; }
.add-task-btn:hover { opacity: 0.88; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { padding: 22px 22px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 14px; }
.main-title { font-size: 20px; font-weight: 700; flex: 1; letter-spacing: -0.4px; }
.search-wrap { position: relative; }
.search-input { padding: 8px 12px 8px 34px; border: 0.5px solid var(--border2); border-radius: var(--rad); font-size: 13px; font-family: var(--font); background: var(--bg2); color: var(--text); width: 200px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
.stats-bar { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); }
.stat { flex: 1; text-align: center; padding: 10px 8px; border-right: 0.5px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-num { font-size: 20px; font-weight: 700; font-family: var(--mono); }
.stat-lbl { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); margin-top: 1px; }
.filter-bar { padding: 10px 22px; border-bottom: 0.5px solid var(--border); display: flex; gap: 6px; align-items: center; }
.filter-pill { padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); transition: all 0.15s; }
.filter-pill:hover { background: var(--bg2); }
.filter-pill.active { background: var(--accent-light); color: #3C3489; border-color: #AFA9EC; }
.filter-sep { flex: 1; }
.sort-select { font-size: 11px; font-family: var(--mono); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); padding: 5px 9px; border-radius: var(--rad); outline: none; cursor: pointer; }
.task-list { flex: 1; overflow-y: auto; padding: 14px; }
.task-list::-webkit-scrollbar { width: 4px; }
.task-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.task-group-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); padding: 8px 4px 6px; }
.task-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad-lg); padding: 12px 14px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 11px; }
.task-card:hover { border-color: var(--border2); }
.task-card.done { opacity: 0.5; }
.task-card.selected { border-color: var(--accent); background: var(--accent-light); }
.task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.15s; font-size: 11px; color: white; }
.task-check:hover { border-color: var(--accent); }
.task-check.done { background: var(--success); border-color: var(--success); }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tag { font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.tag-p1 { background: var(--danger-light); color: #A32D2D; }
.tag-p2 { background: var(--warn-light); color: #854F0B; }
.tag-p3 { background: var(--success-light); color: #3B6D11; }
.tag-label { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
.task-date { font-size: 10px; font-family: var(--mono); color: var(--text3); }
.task-date.overdue { color: var(--danger); font-weight: 500; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-text { font-size: 13px; font-family: var(--mono); }

/* DETAIL PANEL */
.detail-panel { width: 280px; flex-shrink: 0; border-left: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--bg2); }
.detail-panel.hidden { display: none; }
.detail-header { padding: 18px 18px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.detail-header-title { font-size: 13px; font-weight: 600; flex: 1; font-family: var(--mono); color: var(--text2); }
.close-btn { width: 26px; height: 26px; border-radius: var(--rad); border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); font-size: 14px; display: flex; align-items: center; justify-content: center; }
.close-btn:hover { background: var(--bg); }
.detail-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.detail-title-edit { width: 100%; font-size: 15px; font-weight: 600; border: none; background: transparent; color: var(--text); font-family: var(--font); outline: none; margin-bottom: 14px; border-bottom: 1.5px solid transparent; padding-bottom: 4px; line-height: 1.4; }
.detail-title-edit:focus { border-color: var(--accent); }
.detail-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 7px; margin-top: 14px; }
.detail-field { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad); margin-bottom: 5px; }
.detail-field .lbl { font-size: 10px; font-family: var(--mono); color: var(--text3); flex-shrink: 0; width: 56px; }
.detail-select { border: none; background: transparent; color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 500; outline: none; cursor: pointer; flex: 1; }
.detail-date-input { border: none; background: transparent; color: var(--text); font-family: var(--mono); font-size: 12px; font-weight: 500; outline: none; cursor: pointer; flex: 1; }
.notes-area { width: 100%; resize: none; border: 0.5px solid var(--border); border-radius: var(--rad); padding: 9px; font-size: 12px; font-family: var(--font); background: var(--bg); color: var(--text); height: 90px; outline: none; margin-top: 4px; line-height: 1.5; }
.notes-area:focus { border-color: var(--accent); }
.save-btn { width: 100%; padding: 9px; background: var(--accent); color: white; border: none; border-radius: var(--rad); font-family: var(--font); font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 14px; }
.save-btn:hover { opacity: 0.88; }
.delete-btn { width: 100%; padding: 8px; background: none; border: 0.5px solid var(--border2); border-radius: var(--rad); font-family: var(--font); font-size: 12px; color: var(--danger); cursor: pointer; margin-top: 6px; }
.delete-btn:hover { background: var(--danger-light); border-color: var(--danger); }
.saved-toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: var(--rad); font-size: 12px; font-family: var(--mono); font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
.saved-toast.show { opacity: 1; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rad-lg); padding: 24px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.form-group { margin-bottom: 13px; }
.form-label { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 5px; display: block; font-family: var(--mono); }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border2); border-radius: var(--rad); font-size: 13px; font-family: var(--font); background: var(--bg2); color: var(--text); outline: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { height: 72px; resize: none; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-primary { flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--rad); font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-secondary { padding: 10px 16px; background: none; border: 0.5px solid var(--border2); border-radius: var(--rad); font-family: var(--font); font-size: 13px; color: var(--text2); cursor: pointer; }
.btn-secondary:hover { background: var(--bg2); }
.form-input.error { border-color: var(--danger); }

/* PROGRESS BAR */
.progress-bar-wrap { height: 3px; background: var(--border); position: relative; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="app-name">task<span>flow</span></div>
      <div class="app-sub">local · offline · yours</div>
    </div>
    <div class="nav">
      <div class="nav-section">Views</div>
      <div class="nav-item active" id="nav-all" onclick="setView('all',this)">
        <span class="ni-icon">◈</span> All Tasks <span class="badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" id="nav-today" onclick="setView('today',this)">
        <span class="ni-icon">◎</span> Today <span class="badge" id="badge-today">0</span>
      </div>
      <div class="nav-item" id="nav-upcoming" onclick="setView('upcoming',this)">
        <span class="ni-icon">◷</span> Upcoming <span class="badge" id="badge-upcoming">0</span>
      </div>
      <div class="nav-item" id="nav-done" onclick="setView('done',this)">
        <span class="ni-icon">✓</span> Completed <span class="badge" id="badge-done">0</span>
      </div>
      <div class="nav-section" style="margin-top:10px">Projects</div>
      <div class="nav-item" id="nav-Work" onclick="setProject('Work',this)">
        <span class="proj-dot" style="background:#7F77DD"></span> Work <span class="badge" id="badge-work">0</span>
      </div>
      <div class="nav-item" id="nav-Personal" onclick="setProject('Personal',this)">
        <span class="proj-dot" style="background:#1D9E75"></span> Personal <span class="badge" id="badge-personal">0</span>
      </div>
      <div class="nav-item" id="nav-Health" onclick="setProject('Health',this)">
        <span class="proj-dot" style="background:#E24B4A"></span> Health <span class="badge" id="badge-health">0</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="add-task-btn" onclick="openModal()">+ New Task</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div class="main-title" id="main-title">All Tasks</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" placeholder="Search tasks…" oninput="onSearch(this.value)">
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="s-total" style="color:var(--accent)">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num" id="s-done" style="color:var(--success)">0</div><div class="stat-lbl">Done</div></div>
      <div class="stat"><div class="stat-num" id="s-pending" style="color:var(--warn)">0</div><div class="stat-lbl">Pending</div></div>
      <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-lbl">Complete</div></div>
    </div>
    <div class="filter-bar">
      <button class="filter-pill active" onclick="setPriority('all',this)">All</button>
      <button class="filter-pill" onclick="setPriority('p1',this)">🔴 High</button>
      <button class="filter-pill" onclick="setPriority('p2',this)">🟡 Medium</button>
      <button class="filter-pill" onclick="setPriority('p3',this)">🟢 Low</button>
      <div class="filter-sep"></div>
      <select class="sort-select" onchange="setSort(this.value)">
        <option value="created">Newest</option>
        <option value="due">Due Date</option>
        <option value="priority">Priority</option>
        <option value="alpha">A–Z</option>
      </select>
    </div>
    <div class="task-list" id="task-list"></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel hidden" id="detail-panel">
    <div class="detail-header">
      <div class="detail-header-title">task detail</div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">New Task</div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="f-title" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Project</label>
        <select class="form-select" id="f-project">
          <option>Work</option><option>Personal</option><option>Health</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="p1">🔴 High</option>
          <option value="p2" selected>🟡 Medium</option>
          <option value="p3">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date</label>
      <input type="date" class="form-input" id="f-due">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Any extra details…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createTask()">Create Task</button>
    </div>
  </div>
</div>

<div class="saved-toast" id="toast">✓ Saved</div>

<script>
const STORAGE_KEY = 'taskflow_tasks';

const DEFAULT_TASKS = [
  {id:1,title:'Finalize Q2 product roadmap',project:'Work',priority:'p1',due:'2026-04-02',notes:'Include all team feedback',done:false,created:Date.now()-5000},
  {id:2,title:'Weekly team standup prep',project:'Work',priority:'p2',due:'2026-03-31',notes:'',done:false,created:Date.now()-4000},
  {id:3,title:'30 min run in the park',project:'Health',priority:'p3',due:'2026-03-31',notes:'',done:false,created:Date.now()-3000},
  {id:4,title:'Call mom for her birthday',project:'Personal',priority:'p1',due:'2026-04-01',notes:'Order flowers online',done:false,created:Date.now()-2000},
  {id:5,title:'Read "Deep Work" chapter 3',project:'Personal',priority:'p3',due:'2026-04-07',notes:'',done:true,created:Date.now()-1000},
  {id:6,title:'Update portfolio website',project:'Work',priority:'p2',due:'2026-04-10',notes:'Add recent projects',done:false,created:Date.now()-500},
];

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : DEFAULT_TASKS;
  } catch { return DEFAULT_TASKS; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
  showToast();
}

let tasks = load();
let nextId = tasks.length ? Math.max(...tasks.map(t=>t.id))+1 : 1;
let currentView = 'all';
let currentProject = null;
let currentPriority = 'all';
let currentSort = 'created';
let selectedId = null;
let searchQ = '';

const today = new Date(); today.setHours(0,0,0,0);

function fmt(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  const diff = Math.round((dt - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < 0) return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' (overdue)';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function isOverdue(d) {
  if (!d) return false;
  return new Date(d + 'T00:00:00') < today;
}

function isToday(d) {
  if (!d) return false;
  return new Date(d + 'T00:00:00').getTime() === today.getTime();
}

function isFuture(d) {
  if (!d) return false;
  const dt = new Date(d + 'T00:00:00');
  return dt > today;
}

function projColor(p) {
  return p==='Work'?'#7F77DD':p==='Personal'?'#1D9E75':'#E24B4A';
}

function prioTag(p) {
  if (p==='p1') return '<span class="tag tag-p1">HIGH</span>';
  if (p==='p2') return '<span class="tag tag-p2">MED</span>';
  return '<span class="tag tag-p3">LOW</span>';
}

function getFiltered() {
  let list = [...tasks];
  if (currentProject) list = list.filter(t=>t.project===currentProject);
  if (currentView==='today') list = list.filter(t=>isToday(t.due));
  else if (currentView==='upcoming') list = list.filter(t=>isFuture(t.due));
  else if (currentView==='done') list = list.filter(t=>t.done);
  if (currentPriority!=='all') list = list.filter(t=>t.priority===currentPriority);
  if (searchQ) list = list.filter(t=>t.title.toLowerCase().includes(searchQ.toLowerCase())||t.notes.toLowerCase().includes(searchQ.toLowerCase()));
  list.sort((a,b)=>{
    if (currentSort==='priority') return a.priority.localeCompare(b.priority);
    if (currentSort==='due') return (a.due||'z').localeCompare(b.due||'z');
    if (currentSort==='alpha') return a.title.localeCompare(b.title);
    return b.created-a.created;
  });
  return list;
}

function renderList() {
  const el = document.getElementById('task-list');
  const list = getFiltered();
  const pending = list.filter(t=>!t.done);
  const done = list.filter(t=>t.done);

  if (list.length===0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">no tasks here yet</div></div>';
  } else {
    let html = '';
    if (pending.length>0) {
      html += `<div class="task-group-label">Pending · ${pending.length}</div>`;
      pending.forEach(t=>html+=taskCardHTML(t));
    }
    if (done.length>0) {
      html += `<div class="task-group-label" style="margin-top:10px">Completed · ${done.length}</div>`;
      done.forEach(t=>html+=taskCardHTML(t));
    }
    el.innerHTML = html;
  }
  updateStats(list);
  updateBadges();
}

function taskCardHTML(t) {
  const sel = t.id===selectedId?' selected':'';
  const doneCls = t.done?' done':'';
  const ov = isOverdue(t.due)&&!t.done;
  const dLabel = t.due ? fmt(t.due) : '';
  return `<div class="task-card${doneCls}${sel}" onclick="selectTask(${t.id})">
    <div class="task-check${t.done?' done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${t.done?'✓':''}</div>
    <div class="task-body">
      <div class="task-title">${escHTML(t.title)}</div>
      <div class="task-meta">
        ${prioTag(t.priority)}
        <span class="tag tag-label" style="color:${projColor(t.project)}">${t.project}</span>
        ${dLabel?`<span class="task-date${ov?' overdue':''}">${dLabel}</span>`:''}
      </div>
    </div>
  </div>`;
}

function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats(list) {
  const d = list.filter(t=>t.done).length;
  const p = list.filter(t=>!t.done).length;
  const total = list.length;
  const pct = total?Math.round(d/total*100):0;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = d;
  document.getElementById('s-pending').textContent = p;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('prog-bar').style.width = pct+'%';
}

function updateBadges() {
  document.getElementById('badge-all').textContent = tasks.length;
  document.getElementById('badge-today').textContent = tasks.filter(t=>isToday(t.due)).length;
  document.getElementById('badge-upcoming').textContent = tasks.filter(t=>isFuture(t.due)).length;
  document.getElementById('badge-done').textContent = tasks.filter(t=>t.done).length;
  document.getElementById('badge-work').textContent = tasks.filter(t=>t.project==='Work').length;
  document.getElementById('badge-personal').textContent = tasks.filter(t=>t.project==='Personal').length;
  document.getElementById('badge-health').textContent = tasks.filter(t=>t.project==='Health').length;
}

function toggleDone(id) {
  const t = tasks.find(t=>t.id===id);
  if (t) { t.done=!t.done; save(); renderList(); if(selectedId===id) renderDetail(t); }
}

function selectTask(id) {
  selectedId = id;
  const t = tasks.find(t=>t.id===id);
  document.getElementById('detail-panel').classList.remove('hidden');
  renderDetail(t);
  renderList();
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detail-panel').classList.add('hidden');
  renderList();
}

function renderDetail(t) {
  const prioLabel = {p1:'🔴 High',p2:'🟡 Medium',p3:'🟢 Low'};
  document.getElementById('detail-body').innerHTML = `
    <input class="detail-title-edit" id="d-title" value="${escHTML(t.title)}" placeholder="Task title">
    <div class="detail-label">Project</div>
    <div class="detail-field">
      <span class="lbl">project</span>
      <select class="detail-select" id="d-project">
        <option${t.project==='Work'?' selected':''}>Work</option>
        <option${t.project==='Personal'?' selected':''}>Personal</option>
        <option${t.project==='Health'?' selected':''}>Health</option>
      </select>
    </div>
    <div class="detail-label">Priority & Due</div>
    <div class="detail-field">
      <span class="lbl">priority</span>
      <select class="detail-select" id="d-priority">
        <option value="p1"${t.priority==='p1'?' selected':''}>🔴 High</option>
        <option value="p2"${t.priority==='p2'?' selected':''}>🟡 Medium</option>
        <option value="p3"${t.priority==='p3'?' selected':''}>🟢 Low</option>
      </select>
    </div>
    <div class="detail-field">
      <span class="lbl">due date</span>
      <input type="date" class="detail-date-input" id="d-due" value="${t.due||''}">
    </div>
    <div class="detail-field">
      <span class="lbl">status</span>
      <span style="font-size:13px;font-weight:500;flex:1;">${t.done?'✓ Done':'○ Pending'}</span>
    </div>
    <div class="detail-label">Notes</div>
    <textarea class="notes-area" id="d-notes" placeholder="Add notes…">${escHTML(t.notes)}</textarea>
    <button class="save-btn" onclick="saveDetail(${t.id})">Save Changes</button>
    <button class="delete-btn" onclick="deleteTask(${t.id})">Delete Task</button>
  `;
}

function saveDetail(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  t.title = document.getElementById('d-title').value.trim() || t.title;
  t.project = document.getElementById('d-project').value;
  t.priority = document.getElementById('d-priority').value;
  t.due = document.getElementById('d-due').value;
  t.notes = document.getElementById('d-notes').value;
  save();
  renderList();
  renderDetail(t);
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t=>t.id!==id);
  save();
  selectedId = null;
  document.getElementById('detail-panel').classList.add('hidden');
  renderList();
}

function setView(v, el) {
  currentView = v; currentProject = null;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const titles={all:'All Tasks',today:"Today's Tasks",upcoming:'Upcoming',done:'Completed'};
  document.getElementById('main-title').textContent = titles[v];
  renderList();
}

function setProject(p, el) {
  currentProject = p; currentView = 'all';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('main-title').textContent = p;
  renderList();
}

function setPriority(p, el) {
  currentPriority = p;
  document.querySelectorAll('.filter-pill').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function setSort(v) { currentSort=v; renderList(); }
function onSearch(v) { searchQ=v; renderList(); }

function openModal() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-due').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-priority').value = 'p2';
  document.getElementById('f-title').classList.remove('error');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function createTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').classList.add('error'); return; }
  tasks.unshift({
    id: nextId++,
    title,
    project: document.getElementById('f-project').value,
    priority: document.getElementById('f-priority').value,
    due: document.getElementById('f-due').value,
    notes: document.getElementById('f-notes').value,
    done: false,
    created: Date.now()
  });
  save();
  closeModal();
  renderList();
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeDetail(); }
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openModal(); }
});

let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

renderList();
</script>
</body>
</html>
